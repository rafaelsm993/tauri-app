# Builds and publishes installers when a version tag is pushed
# Tag format: v1.2.3
# Produces: .deb, .AppImage, .exe, .dmg via tauri-action
name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-tauri }

      # Linux dependencies for WebKitGTK
      - if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TauriFlix ${{ github.ref_name }}
          releaseBody: |
            See [CHANGELOG.md](CHANGELOG.md) for what changed.
          releaseDraft: true      # review before publishing
          prerelease: false
